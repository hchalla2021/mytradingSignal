version: '3.8'

services:
  # Redis Cache (Optional but recommended for production)
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override with container-specific settings
      - PORT=8000
      - HOST=0.0.0.0
      # ✅ CRITICAL FIX: Use container name, not localhost
      - REDIS_URL=redis://redis:6379
      # CRITICAL: Enable scheduler for automatic market hours management
      - ENABLE_SCHEDULER=true
    volumes:
      # Mount .env for token hot-reload (token watcher)
      - ./backend/.env:/app/.env
      # Persist access token across restarts
      - ./backend/access_token.txt:/app/access_token.txt
      # Mount logs directory (optional)
      - ./backend/logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]

  # Frontend Next.js Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # NOTE: NEXT_PUBLIC_* vars are baked into the Next.js build at image build time.
      # They CANNOT be overridden at container runtime via environment:.
      # Production values are read from frontend/.env.local during `docker build`.
      # Ensure frontend/.env.local has correct production URLs before building.
      - NODE_ENV=production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Docker Networks
networks:
  default:
    name: trading-network

# Persistent Volumes
volumes:
  redis-data:
